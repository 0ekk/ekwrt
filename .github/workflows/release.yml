name: Release OpenWrt x86_64

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version token appended after -ek-
        required: true
        type: string

concurrency:
  group: ekwrt-${{ github.event_name }}-${{ github.ref_name || inputs.release_version }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO_ROOT: ${{ github.workspace }}
      WORK_DIR: ${{ github.workspace }}/work
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib genisoimage git gperf haveged help2man intltool \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-setuptools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs unzip vim wget xmlto xsltproc zlib1g-dev zstd jq

      - name: Free disk space
        run: |
          sudo docker system prune -af || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo rm -rf /usr/share/swift /usr/local/.ghcup /usr/local/julia* || true
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/node_modules || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/* || true
          df -h

      - name: Resolve release token
        id: release-token
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_token="${{ inputs.release_version }}"
            release_tag="manual-${release_token}"
          else
            release_token="${{ github.ref_name }}"
            release_tag="${{ github.ref_name }}"
          fi
          echo "release_token=${release_token}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout OpenWrt upstream
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          scripts/checkout-upstream.sh > "$WORK_DIR/build.env"
          cat "$WORK_DIR/build.env" >> "$GITHUB_ENV"

      - name: Prepare extra sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          scripts/prepare-extra-sources.sh

      - name: Register local feeds
        shell: bash
        run: |
          set -euo pipefail
          printf '\nsrc-link ek_local %s/packages\n' "$REPO_ROOT" >> "$BUILDROOT_DIR/feeds.conf.default"
          if [ -s "$WORK_DIR/feeds.extra.conf" ]; then
            cat "$WORK_DIR/feeds.extra.conf" >> "$BUILDROOT_DIR/feeds.conf.default"
          fi

      - name: Update and install feeds
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILDROOT_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply integrations
        shell: bash
        run: |
          set -euo pipefail
          scripts/apply-integrations.sh

      - name: Validate selected packages
        shell: bash
        run: |
          set -euo pipefail
          scripts/validate-package-lists.sh

      - name: Compute firmware version
        shell: bash
        env:
          RELEASE_TOKEN: ${{ steps.release-token.outputs.release_token }}
        run: |
          set -euo pipefail
          scripts/compute-version.sh > "$WORK_DIR/version.env"
          cat "$WORK_DIR/version.env" >> "$GITHUB_ENV"

      - name: Generate OpenWrt config
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_CONFIG="$BUILDROOT_DIR/.config" scripts/generate-config.sh

      - name: Prepare runtime overlay
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release-token.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          rm -rf "$BUILDROOT_DIR/files"
          OVERLAY_DIR="$BUILDROOT_DIR/files" scripts/render-runtime-overlay.sh

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILDROOT_DIR }}/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('config/upstream.conf', 'config/release.conf', 'config/**/*.txt', 'config/sources.d/*.conf') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          cd "$BUILDROOT_DIR"
          build_jobs=2
          report_disk() {
            df -h
            du -sh build_dir staging_dir bin dl 2>/dev/null || true
          }
          diagnose_failure() {
            set +e
            echo "Build failed. Re-running install phases with verbose logging."
            make -j1 package/install V=sc
            make -j1 target/install V=sc
          }
          trap report_disk EXIT
          make defconfig
          report_disk
          make download -j"$build_jobs"
          report_disk
          make -j"$build_jobs" || {
            diagnose_failure
            exit 1
          }

      - name: Package release assets
        shell: bash
        env:
          RELEASE_NAME: ${{ steps.release-token.outputs.release_tag }}
        run: |
          set -euo pipefail
          TARGET_DIR="$BUILDROOT_DIR/bin/targets/x86/64" DIST_DIR="$REPO_ROOT/dist" scripts/package-release.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-token.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body: |
            Release artifacts:
            - apks.tar.zst
            - config.buildinfo
            - feeds.buildinfo
            - version.buildinfo
          files: |
            dist/apks.tar.zst
            dist/config.buildinfo
            dist/feeds.buildinfo
            dist/version.buildinfo
